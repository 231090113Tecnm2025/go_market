name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Mostrar información
      run: |
        echo "✅ Pipeline ejecutándose correctamente"
        echo "Python version:"
        python --version
        echo "Archivos en el repositorio:"
        ls -la
        echo "Estructura del proyecto:"
        ls -la backend/ 2>/dev/null || echo "No hay carpeta backend"
        ls -la database/ 2>/dev/null || echo "No hay carpeta database"
        ls -la mosquitto/ 2>/dev/null || echo "No hay carpeta mosquitto"
