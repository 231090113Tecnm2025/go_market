version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: erp_postgres
    environment:
      POSTGRES_DB: erp_supermercado
      POSTGRES_USER: Latukov
      POSTGRES_PASSWORD: Latukov2004#
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - backend-net

  mongodb:
    image: mongo:6
    container_name: erp_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: Latukov
      MONGO_INITDB_ROOT_PASSWORD: Latukov2004#
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend-net

  redis:
    image: redis:alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    networks:
      - backend-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: erp_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - backend-net

volumes:
  postgres_data:
  mongo_data:

networks:
  backend-net:
    driver: bridge
